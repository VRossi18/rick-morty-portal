name: Pipeline

env:
   NODE_VERSION: '24.15.0'
   PACKAGE_MANAGER: 'pnpm'
   PACKAGE_MANAGER_VERSION: '10.15.0'

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

permissions:
   actions: write
   contents: read
   pages: write
   id-token: write
   packages: write

jobs:
   lint-and-test:
      name: Lint and test
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v5
         - name: install node
           uses: actions/setup-node@v5
           with:
              node-version: ${{ env.NODE_VERSION }}
         - name: install pnpm (package manager)
           uses: pnpm/action-setup@v5
           with:
              version: ${{ env.PACKAGE_MANAGER_VERSION }}
         - name: Test and audit
           run: |
              pnpm install
              pnpm lint
              pnpm test
         - name: Write RPG character export sample (CI fixture)
           run: pnpm run rpg:write-export-sample
         - name: Upload RPG character export sample
           uses: actions/upload-artifact@v6
           with:
              name: rpg-character-export-sample
              path: artifacts/rpg-character-export.sample.json

   build-audit-package:
      name: Build, audit and package
      needs: lint-and-test
      runs-on: ubuntu-latest
      steps:
         - name: checkout
           uses: actions/checkout@v5
         - name: install node
           uses: actions/setup-node@v5
           with:
              node-version: '24.15.0'
         - name: install pnpm (package manager)
           uses: pnpm/action-setup@v5
           with:
              version: 10.15.0
         - name: Build and audit
           run: |
              pnpm install
              pnpm run build
              pnpm audit
         - name: Package dist for GitHub Pages
           if: github.ref == 'refs/heads/main' && github.event_name == 'push'
           uses: actions/upload-pages-artifact@v5
           with:
              path: dist

   deploy:
      name: Deploy to Cloud Run and test
      needs: build-audit-package
      runs-on: ubuntu-latest
      steps:
         - name: Log in ghcr.io
           uses: docker/login-action@v3
           with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Authenticate with Google Cloud
           id: auth
           uses: google-github-actions/auth@v2
           with:
              workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
              service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

         - name: Set up Google Cloud CLI
           uses: google-github-actions/setup-gcloud@v2

         - name: Configure Docker
           run: gcloud auth configure-docker ${{ secrets.GPC_REGION }}-docker.pkg.dev

         - name: Tag the image for GCP Container Registry
           run: |
              set -euo pipefail
              docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} \
               ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REGISTRY_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
              docker image ls

         - name: Push the tagged image to GCP Container Registry
           run: docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_REGISTRY_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

         - name: Deploy to Cloud Run service
           uses: google-github-actions/deploy-cloudrun@v2
           with:
              service: ${{ env.SERVICE_NAME }}
              region: ${{ secrets.GCP_REGION }}
              image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{secrets.GCP_PROJECT_ID}}/${{ secrets.GCP_REGISTRY_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
              flags: '--allow-unauthenticated'

         - name: Test the Live Application
           run: |
              DEPLOY_URL=$(gcloud run services describe $SERVICE_NAME --platform=managed --region=${{ secrets.GCP_REGION }} --format='value(status.url)')
              echo "Testing DEPLOY_URL: ${DEPLOY_URL}"
              curl --silent --fail ${DEPLOY_URL}/health
              curl --silent --fail ${DEPLOY_URL}/05024756-765e-41a9-89d7-1407436d9a58

   deploy-pages:
      name: Deploy GitHub Pages
      needs: build-audit-package
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      environment:
         name: github-pages
         url: ${{ steps.deployment.outputs.page_url }}
      steps:
         - name: Publicar site (artifact -> Pages)
           id: deployment
           uses: actions/deploy-pages@v5

   tag-deploy:
      name: Tag release (patch)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      needs: deploy-pages
      runs-on: ubuntu-latest
      permissions:
         contents: write
      steps:
         - name: checkout
           uses: actions/checkout@v5
           with:
              fetch-depth: 0
              fetch-tags: true
         - name: Configure Git for tags
           run: |
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         - name: Bump patch tag and push
           run: |
              set -euo pipefail
              PREFIX_FILE=".github/version-prefix"
              test -f "$PREFIX_FILE" || { echo "Missing ${PREFIX_FILE}"; exit 1; }
              PREFIX="$(tr -d ' \t\r\n' < "$PREFIX_FILE" | sed 's/^v//')"
              if ! echo "$PREFIX" | grep -Eq '^[0-9]+\.[0-9]+$'; then
                echo "Invalid version prefix in ${PREFIX_FILE} (use MAJOR.MINOR, e.g. 1.0): got '${PREFIX}'"
                exit 1
              fi

              git fetch --tags origin

              latest="$(git tag -l "v${PREFIX}.*" --sort=-v:refname | head -n1 || true)"
              if [ -z "$latest" ]; then
                NEWTAG="v${PREFIX}.1"
                echo "No tags for v${PREFIX}.*; creating ${NEWTAG}"
              else
                base="${latest#v}"
                patch="${base##*.}"
                major_minor="${base%.*}"
                if [ "$major_minor" != "$PREFIX" ]; then
                  echo "Latest tag ${latest} does not match prefix ${PREFIX}; refusing to guess"
                  exit 1
                fi
                newpatch=$((10#${patch} + 1))
                NEWTAG="v${major_minor}.${newpatch}"
                echo "Latest was ${latest}; creating ${NEWTAG}"
              fi

              if git rev-parse "${NEWTAG}" >/dev/null 2>&1; then
                echo "Tag ${NEWTAG} already exists locally; skipping"
                exit 0
              fi

              if [ -n "$(git ls-remote --tags origin "refs/tags/${NEWTAG}" 2>/dev/null || true)" ]; then
                echo "Tag ${NEWTAG} already exists on remote; skipping"
                exit 0
              fi

              git tag "${NEWTAG}"
              git push origin "refs/tags/${NEWTAG}"
              echo "Pushed tag ${NEWTAG}"
